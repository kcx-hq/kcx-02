AWSTemplateFormatVersion: '2010-09-09'
Description: KCX CloudTrail setup module for anomaly event ingestion

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: ConnectionName must contain only lowercase letters, numbers, and hyphens.

  CallbackUrl:
    Type: String
    Description: KCX setup callback endpoint URL

  FileEventCallbackUrl:
    Type: String
    Description: KCX file event callback endpoint URL

  CallbackToken:
    Type: String
    Description: Unique callback token generated by KCX

  KcxPrincipalArn:
    Type: String
    Default: arn:aws:iam::275017715736:root
    Description: KCX IAM principal ARN allowed to assume the client role

  CloudTrailPrefix:
    Type: String
    Default: kcx/cloudtrail
    Description: Prefix where CloudTrail logs will be delivered

  CloudTrailName:
    Type: String
    Default: KCX-Trail
    Description: Name of the CloudTrail trail

  BillingRoleArn:
    Type: String
    Default: ''
    Description: Existing KCX billing role ARN used by platform for reading related telemetry

Resources:
  KCXCloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub kcx-cloudtrail-${AWS::AccountId}-${AWS::Region}-${ConnectionName}
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: managed-by
          Value: kcx
        - Key: connection-name
          Value: !Ref ConnectionName

  KCXCloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref KCXCloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt KCXCloudTrailBucket.Arn

          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${KCXCloudTrailBucket.Arn}/${CloudTrailPrefix}/AWSLogs/${AWS::AccountId}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  KCXTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn:
      - KCXCloudTrailBucketPolicy
    Properties:
      TrailName: !Ref CloudTrailName
      S3BucketName: !Ref KCXCloudTrailBucket
      S3KeyPrefix: !Ref CloudTrailPrefix
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true

  KCXCloudTrailCallbackLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  KCXCloudTrailCallbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt KCXCloudTrailCallbackLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          const https = require('https');
          const { URL } = require('url');

          function sendCfnResponse(event, context, status, data, physicalResourceId, noEcho) {
            return new Promise((resolve, reject) => {
              const responseBody = JSON.stringify({
                Status: status,
                Reason: `See CloudWatch Log Stream: ${context.logStreamName}`,
                PhysicalResourceId: physicalResourceId || context.logStreamName,
                StackId: event.StackId,
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
                NoEcho: !!noEcho,
                Data: data || {}
              });

              const parsedUrl = new URL(event.ResponseURL);

              const options = {
                hostname: parsedUrl.hostname,
                port: 443,
                path: parsedUrl.pathname + parsedUrl.search,
                method: 'PUT',
                headers: {
                  'content-type': '',
                  'content-length': Buffer.byteLength(responseBody)
                }
              };

              const req = https.request(options, (res) => {
                res.on('data', () => {});
                res.on('end', resolve);
              });

              req.on('error', reject);
              req.write(responseBody);
              req.end();
            });
          }

          function postJson(urlString, payload) {
            const parsed = new URL(urlString);
            const body = JSON.stringify(payload);

            const options = {
              hostname: parsed.hostname,
              port: parsed.port || 443,
              path: parsed.pathname + (parsed.search || ''),
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            };

            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve({ statusCode: res.statusCode, body: data });
                  } else {
                    reject(new Error(`Callback failed: ${res.statusCode} ${data}`));
                  }
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          exports.handler = async (event, context) => {
            const props = event.ResourceProperties || {};
            const physicalId = `kcx-cloudtrail-callback-${props.AccountId || 'unknown'}-${props.ConnectionName || 'unknown'}`;

            try {
              const required = [
                'CallbackUrl',
                'CallbackToken',
                'AccountId',
                'StackId',
                'ConnectionName',
                'TrailName',
                'BucketName',
                'BucketRegion',
                'Prefix'
              ];

              for (const key of required) {
                if (!props[key]) throw new Error(`Missing required callback property: ${key}`);
              }

              if (event.RequestType === 'Delete') {
                try {
                  await postJson(props.CallbackUrl, {
                    callback_token: props.CallbackToken,
                    event_type: 'stack_delete',
                    account_id: props.AccountId,
                    stack_id: props.StackId,
                    connection_name: props.ConnectionName,
                    source_type: 'aws_cloudtrail',
                    schema_type: 'cloudtrail_json',
                    setup_mode: 'cloud_connected',
                    cadence: 'event_driven',
                    trail_name: props.TrailName,
                    bucket_name: props.BucketName,
                    bucket_region: props.BucketRegion,
                    prefix: props.Prefix,
                    role_arn: props.BillingRoleArn || undefined
                  });
                } catch (deleteErr) {}

                await sendCfnResponse(event, context, 'SUCCESS', { deleted: true }, physicalId);
                return;
              }

              await postJson(props.CallbackUrl, {
                callback_token: props.CallbackToken,
                event_type: event.RequestType === 'Update' ? 'stack_update' : 'stack_create',
                account_id: props.AccountId,
                stack_id: props.StackId,
                connection_name: props.ConnectionName,
                source_type: 'aws_cloudtrail',
                schema_type: 'cloudtrail_json',
                setup_mode: 'cloud_connected',
                cadence: 'event_driven',
                trail_name: props.TrailName,
                bucket_name: props.BucketName,
                bucket_region: props.BucketRegion,
                prefix: props.Prefix,
                role_arn: props.BillingRoleArn || undefined
              });

              await sendCfnResponse(event, context, 'SUCCESS', { delivered: true }, physicalId);
            } catch (err) {
              await sendCfnResponse(
                event,
                context,
                'FAILED',
                { error: err.message || 'Unknown error' },
                physicalId
              );
            }
          };

  KCXCloudTrailCallbackFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${KCXCloudTrailCallbackFunction}
      RetentionInDays: 14

  KCXNotifyCloudTrailPlatform:
    Type: Custom::KCXNotifyCloudTrail
    Properties:
      ServiceToken: !GetAtt KCXCloudTrailCallbackFunction.Arn
      CallbackUrl: !Ref CallbackUrl
      CallbackToken: !Ref CallbackToken
      AccountId: !Ref AWS::AccountId
      StackId: !Ref AWS::StackId
      ConnectionName: !Ref ConnectionName
      TrailName: !Ref CloudTrailName
      BucketName: !Ref KCXCloudTrailBucket
      BucketRegion: !Ref AWS::Region
      Prefix: !Ref CloudTrailPrefix
      BillingRoleArn: !Ref BillingRoleArn

  KCXCloudTrailEventLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  KCXCloudTrailEventFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt KCXCloudTrailEventLambdaRole.Arn
      Timeout: 60
      Environment:
        Variables:
          FILE_EVENT_CALLBACK_URL: !Ref FileEventCallbackUrl
          CALLBACK_TOKEN: !Ref CallbackToken
          ROLE_ARN: !Ref BillingRoleArn
          CLOUDTRAIL_PREFIX: !Ref CloudTrailPrefix
          SOURCE_TYPE: aws_cloudtrail
          SCHEMA_TYPE: cloudtrail_json
          CADENCE: event_driven
      Code:
        ZipFile: |
          const https = require('https');
          const { URL } = require('url');

          function postJson(urlString, payload) {
            const parsed = new URL(urlString);
            const body = JSON.stringify(payload);

            const options = {
              hostname: parsed.hostname,
              port: parsed.port || 443,
              path: parsed.pathname + (parsed.search || ''),
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            };

            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve({ statusCode: res.statusCode, body: data });
                  } else {
                    reject(new Error(`File event callback failed: ${res.statusCode} ${data}`));
                  }
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          exports.handler = async (event) => {
            const callbackUrl = process.env.FILE_EVENT_CALLBACK_URL;
            const callbackToken = process.env.CALLBACK_TOKEN;
            const roleArn = process.env.ROLE_ARN;
            const cloudtrailPrefix = process.env.CLOUDTRAIL_PREFIX || '';
            const sourceType = process.env.SOURCE_TYPE;
            const schemaType = process.env.SCHEMA_TYPE;
            const cadence = process.env.CADENCE;

            if (!callbackUrl || !callbackToken) {
              throw new Error('Missing required Lambda environment variables');
            }

            const bucket = event?.detail?.bucket?.name;
            const rawKey = event?.detail?.object?.key;
            const eventId = event?.id || null;

            if (!bucket || !rawKey) {
              throw new Error('Missing bucket name or object key in EventBridge event');
            }

            const objectKey = decodeURIComponent(String(rawKey).replace(/\+/g, ' '));

            if (cloudtrailPrefix && !objectKey.startsWith(cloudtrailPrefix)) {
              return;
            }

            const isCloudTrailLog =
              objectKey.includes('/AWSLogs/') &&
              (objectKey.endsWith('.json.gz') || objectKey.endsWith('.json'));

            if (!isCloudTrailLog) {
              return;
            }

            await postJson(callbackUrl, {
              callback_token: callbackToken,
              trigger_type: 'cloudtrail_object_created',
              event_id: eventId,
              account_id: event.account,
              region: event.region,
              role_arn: roleArn || undefined,
              bucket_name: bucket,
              object_key: objectKey,
              source_type: sourceType,
              schema_type: schemaType,
              cadence: cadence
            });
          };

  KCXCloudTrailEventFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${KCXCloudTrailEventFunction}
      RetentionInDays: 14

  KCXCloudTrailObjectCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route S3 object created events for KCX CloudTrail prefix to Lambda
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref KCXCloudTrailBucket
          object:
            key:
              - prefix: !Ref CloudTrailPrefix
      State: ENABLED
      Targets:
        - Arn: !GetAtt KCXCloudTrailEventFunction.Arn
          Id: KCXCloudTrailEventFunctionTarget

  KCXCloudTrailInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref KCXCloudTrailEventFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt KCXCloudTrailObjectCreatedRule.Arn

Outputs:
  CloudTrailBucket:
    Description: CloudTrail S3 bucket
    Value: !Ref KCXCloudTrailBucket

  CloudTrailPrefix:
    Description: CloudTrail S3 prefix
    Value: !Ref CloudTrailPrefix

  CloudTrailName:
    Description: CloudTrail trail name
    Value: !Ref CloudTrailName