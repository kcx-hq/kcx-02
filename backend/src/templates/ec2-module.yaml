AWSTemplateFormatVersion: '2010-09-09'
Description: KCX EC2 action permissions module

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: ConnectionName must contain only lowercase letters, numbers, and hyphens.

  ActionRoleName:
    Type: String
    Description: Name of the IAM role to attach EC2 permissions to

  UseTagScopedAccess:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'

  ResourceTagKey:
    Type: String
    Default: managed-by

  ResourceTagValue:
    Type: String
    Default: kcx

Conditions:
  UseTagScope: !Equals [!Ref UseTagScopedAccess, 'true']

Resources:
  KCXEC2ModulePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub kcx-ec2-module-${ConnectionName}
      Roles:
        - !Ref ActionRoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2ReadAccess
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeTags
              - ec2:DescribeRegions
              - ec2:DescribeVolumes
              - ec2:DescribeAddresses
              - ec2:DescribeSnapshots
            Resource: "*"

          - !If
            - UseTagScope
            - {
                Sid: EC2ActionsWithTagScope,
                Effect: Allow,
                Action: [
                  ec2:StartInstances,
                  ec2:StopInstances,
                  ec2:RebootInstances,
                  ec2:ModifyInstanceAttribute,
                  ec2:DeleteVolume,
                  ec2:ReleaseAddress,
                  ec2:DeleteSnapshot
                ],
                Resource: [
                  "arn:aws:ec2:*:*:instance/*",
                  "arn:aws:ec2:*:*:volume/*",
                  "arn:aws:ec2:*:*:elastic-ip/*",
                  "arn:aws:ec2:*:*:snapshot/*"
                ],
                Condition: {
                  StringEquals: {
                    "aws:ResourceTag/managed-by": !Ref ResourceTagValue
                  }
                }
              }
            - !Ref AWS::NoValue

          - !If
            - UseTagScope
            - !Ref AWS::NoValue
            - {
                Sid: EC2ActionsWithoutTagScope,
                Effect: Allow,
                Action: [
                  ec2:StartInstances,
                  ec2:StopInstances,
                  ec2:RebootInstances,
                  ec2:ModifyInstanceAttribute,
                  ec2:DeleteVolume,
                  ec2:ReleaseAddress,
                  ec2:DeleteSnapshot
                ],
                Resource: [
                  "arn:aws:ec2:*:*:instance/*",
                  "arn:aws:ec2:*:*:volume/*",
                  "arn:aws:ec2:*:*:elastic-ip/*",
                  "arn:aws:ec2:*:*:snapshot/*"
                ]
              }

Outputs:
  ModuleName:
    Description: Name of the enabled module
    Value: ec2

  TagScoped:
    Description: Whether tag-scoped EC2 access is enabled
    Value: !Ref UseTagScopedAccess
