AWSTemplateFormatVersion: '2010-09-09'
Description: KCX parent stack for billing export + action permissions modules

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: ConnectionName must contain only lowercase letters, numbers, and hyphens.

  KcxPrincipalArn:
    Type: String
    Default: arn:aws:iam::275017715736:root
    Description: KCX IAM principal ARN allowed to assume the client roles

  CallbackUrl:
    Type: String
    Default: ''
    Description: KCX setup callback endpoint URL

  FileEventCallbackUrl:
    Type: String
    Default: ''
    Description: KCX file event callback endpoint URL

  CallbackToken:
    Type: String
    Default: ''
    Description: Unique callback token generated by KCX

  ExportPrefix:
    Type: String
    Default: kcx/data-exports/cur2
    Description: Prefix where parquet export files will be delivered

  ExportName:
    Type: String
    Default: KCX-CUR2-Export
    Description: Name of the AWS Data Export

  EnableBillingExport:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  EnableActionRole:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  EnableEC2Module:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  UseTagScopedAccess:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'

  ResourceTagKey:
    Type: String
    Default: managed-by

  ResourceTagValue:
    Type: String
    Default: kcx

  BillingTemplateUrl:
    Type: String
    Description: S3 URL of billing-export.yaml

  ActionRoleTemplateUrl:
    Type: String
    Description: S3 URL of action-role.yaml

  Ec2ModuleTemplateUrl:
    Type: String
    Description: S3 URL of ec2-module.yaml

Conditions:
  CreateBillingExport: !Equals [!Ref EnableBillingExport, 'true']
  CreateActionRole: !Equals [!Ref EnableActionRole, 'true']
  CreateEC2Module: !And
    - !Equals [!Ref EnableActionRole, 'true']
    - !Equals [!Ref EnableEC2Module, 'true']

Resources:
  ActionRoleStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateActionRole
    Properties:
      TemplateURL: !Ref ActionRoleTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        KcxPrincipalArn: !Ref KcxPrincipalArn

  EC2ModuleStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateEC2Module
    DependsOn: ActionRoleStack
    Properties:
      TemplateURL: !Ref Ec2ModuleTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        ActionRoleName: !GetAtt ActionRoleStack.Outputs.ActionRoleName
        UseTagScopedAccess: !Ref UseTagScopedAccess
        ResourceTagKey: !Ref ResourceTagKey
        ResourceTagValue: !Ref ResourceTagValue

  BillingExportStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateBillingExport
    Properties:
      TemplateURL: !Ref BillingTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        CallbackUrl: !Ref CallbackUrl
        FileEventCallbackUrl: !Ref FileEventCallbackUrl
        CallbackToken: !Ref CallbackToken
        KcxPrincipalArn: !Ref KcxPrincipalArn
        ExportPrefix: !Ref ExportPrefix
        ExportName: !Ref ExportName

Outputs:
  ActionRoleArn:
    Condition: CreateActionRole
    Description: ARN of the action role KCX can assume
    Value: !GetAtt ActionRoleStack.Outputs.ActionRoleArn

  ActionRoleName:
    Condition: CreateActionRole
    Description: Name of the action role
    Value: !GetAtt ActionRoleStack.Outputs.ActionRoleName

  BillingRoleArn:
    Condition: CreateBillingExport
    Description: ARN of the billing export role KCX can assume
    Value: !GetAtt BillingExportStack.Outputs.RoleArn

  BillingExportBucket:
    Condition: CreateBillingExport
    Description: Billing export bucket
    Value: !GetAtt BillingExportStack.Outputs.ExportBucket

  BillingExportArn:
    Condition: CreateBillingExport
    Description: Billing export ARN
    Value: !GetAtt BillingExportStack.Outputs.ExportArn

  AccountId:
    Description: AWS account ID where stack was created
    Value: !Ref AWS::AccountId