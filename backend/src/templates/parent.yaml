AWSTemplateFormatVersion: '2010-09-09'
Description: KCX parent stack for billing export + cloudtrail + action permissions modules

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: ConnectionName must contain only lowercase letters, numbers, and hyphens.

  KcxPrincipalArn:
    Type: String
    Default: arn:aws:iam::275017715736:root
    Description: KCX IAM principal ARN allowed to assume the client roles

  CallbackUrl:
    Type: String
    Default: ''
    Description: KCX setup callback endpoint URL

  FileEventCallbackUrl:
    Type: String
    Default: ''
    Description: KCX file event callback endpoint URL

  CallbackToken:
    Type: String
    Default: ''
    Description: Unique callback token generated by KCX

  ExportPrefix:
    Type: String
    Default: kcx/data-exports/cur2
    Description: Prefix where parquet export files will be delivered

  ExportName:
    Type: String
    Default: KCX-CUR2-Export
    Description: Name of the AWS Data Export

  StorageLensExportPrefix:
    Type: String
    Default: kcx/storage-lens
    Description: Prefix where S3 Storage Lens exports will be delivered

  StorageLensConfigId:
    Type: String
    Default: ''
    Description: Optional unique Storage Lens configuration ID

  EnableBillingExport:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  EnableCloudTrail:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  CloudTrailPrefix:
    Type: String
    Default: kcx/cloudtrail
    Description: Prefix where CloudTrail logs will be delivered

  CloudTrailName:
    Type: String
    Default: KCX-Trail
    Description: Name of the CloudTrail trail

  EnableActionRole:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  EnableEC2Module:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  EnableCloudWatchModule:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

  UseTagScopedAccess:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'

  ResourceTagKey:
    Type: String
    Default: managed-by

  ResourceTagValue:
    Type: String
    Default: kcx

  BillingTemplateUrl:
    Type: String
    Description: S3 URL of billing-export.yaml

  CloudTrailTemplateUrl:
    Type: String
    Description: S3 URL of cloudtrail.yaml

  ActionRoleTemplateUrl:
    Type: String
    Description: S3 URL of action-role.yaml

  Ec2ModuleTemplateUrl:
    Type: String
    Description: S3 URL of ec2-module.yaml

  CloudwatchModuleTemplateUrl:
    Type: String
    Description: S3 URL of cloudwatch-module.yaml

Conditions:
  CreateBillingExport: !Equals [!Ref EnableBillingExport, 'true']
  CreateCloudTrail: !Equals [!Ref EnableCloudTrail, 'true']
  CreateActionRole: !Equals [!Ref EnableActionRole, 'true']
  CreateEC2Module: !And
    - !Equals [!Ref EnableActionRole, 'true']
    - !Equals [!Ref EnableEC2Module, 'true']
  CreateCloudWatchModule: !And
    - !Equals [!Ref EnableActionRole, 'true']
    - !Equals [!Ref EnableCloudWatchModule, 'true']

Resources:
  ActionRoleStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateActionRole
    Properties:
      TemplateURL: !Ref ActionRoleTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        KcxPrincipalArn: !Ref KcxPrincipalArn

  EC2ModuleStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateEC2Module
    DependsOn: ActionRoleStack
    Properties:
      TemplateURL: !Ref Ec2ModuleTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        ActionRoleName: !GetAtt ActionRoleStack.Outputs.ActionRoleName
        UseTagScopedAccess: !Ref UseTagScopedAccess
        ResourceTagKey: !Ref ResourceTagKey
        ResourceTagValue: !Ref ResourceTagValue

  CloudWatchModuleStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateCloudWatchModule
    DependsOn: ActionRoleStack
    Properties:
      TemplateURL: !Ref CloudwatchModuleTemplateUrl
      Parameters:
        ConnectionName: !Ref ConnectionName
        ActionRoleName: !GetAtt ActionRoleStack.Outputs.ActionRoleName

  BillingExportStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateBillingExport
    DependsOn: ActionRoleStack
    Properties:
      TemplateURL: !Ref BillingTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        CallbackUrl: !Ref CallbackUrl
        FileEventCallbackUrl: !Ref FileEventCallbackUrl
        CallbackToken: !Ref CallbackToken
        KcxPrincipalArn: !Ref KcxPrincipalArn
        ActionRoleArn: !If
          - CreateActionRole
          - !GetAtt ActionRoleStack.Outputs.ActionRoleArn
          - ''
        ExportPrefix: !Ref ExportPrefix
        ExportName: !Ref ExportName
        StorageLensExportPrefix: !Ref StorageLensExportPrefix
        StorageLensConfigId: !Ref StorageLensConfigId

  CloudTrailStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateCloudTrail
    DependsOn: ActionRoleStack
    Properties:
      TemplateURL: !Ref CloudTrailTemplateUrl
      Parameters:
        ExternalId: !Ref ExternalId
        ConnectionName: !Ref ConnectionName
        FileEventCallbackUrl: !Ref FileEventCallbackUrl
        CallbackToken: !Ref CallbackToken
        KcxPrincipalArn: !Ref KcxPrincipalArn
        CloudTrailPrefix: !Ref CloudTrailPrefix
        CloudTrailName: !Ref CloudTrailName
        CallbackUrl: !Ref CallbackUrl
        BillingRoleArn: !If
          - CreateBillingExport
          - !GetAtt BillingExportStack.Outputs.RoleArn
          - ''

Outputs:
  ActionRoleArn:
    Condition: CreateActionRole
    Description: ARN of the action role KCX can assume
    Value: !GetAtt ActionRoleStack.Outputs.ActionRoleArn

  ActionRoleName:
    Condition: CreateActionRole
    Description: Name of the action role
    Value: !GetAtt ActionRoleStack.Outputs.ActionRoleName

  BillingRoleArn:
    Condition: CreateBillingExport
    Description: ARN of the billing export role KCX can assume
    Value: !GetAtt BillingExportStack.Outputs.RoleArn

  BillingExportBucket:
    Condition: CreateBillingExport
    Description: Billing export bucket
    Value: !GetAtt BillingExportStack.Outputs.ExportBucket

  BillingExportArn:
    Condition: CreateBillingExport
    Description: Billing export ARN
    Value: !GetAtt BillingExportStack.Outputs.ExportArn

  CloudTrailBucket:
    Condition: CreateCloudTrail
    Description: CloudTrail bucket
    Value: !GetAtt CloudTrailStack.Outputs.CloudTrailBucket

  CloudTrailPrefix:
    Condition: CreateCloudTrail
    Description: CloudTrail prefix
    Value: !GetAtt CloudTrailStack.Outputs.CloudTrailPrefix

  CloudTrailName:
    Condition: CreateCloudTrail
    Description: CloudTrail trail name
    Value: !GetAtt CloudTrailStack.Outputs.CloudTrailName

  AccountId:
    Description: AWS account ID where stack was created
    Value: !Ref AWS::AccountId
