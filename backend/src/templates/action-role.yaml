AWSTemplateFormatVersion: '2010-09-09'
Description: KCX action role for runtime cloud actions

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: ConnectionName must contain only lowercase letters, numbers, and hyphens.

  KcxPrincipalArn:
    Type: String
    Default: arn:aws:iam::275017715736:root
    Description: KCX IAM principal ARN allowed to assume the action role

Resources:
  KCXActionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub kcx-${ConnectionName}-action-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowKcxAssumeRole
            Effect: Allow
            Principal:
              AWS: !Ref KcxPrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: KCXActionRoleBaseValidation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowValidationApis
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                  - ec2:DescribeRegions
                Resource: "*"

Outputs:
  ActionRoleArn:
    Description: ARN of the action role KCX can assume
    Value: !GetAtt KCXActionRole.Arn

  ActionRoleName:
    Description: Name of the action role
    Value: !Ref KCXActionRole