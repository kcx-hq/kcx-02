AWSTemplateFormatVersion: '2010-09-09'
Description: KCX AWS Connection Template

Parameters:
  ExternalId:
    Type: String
    Description: Unique external ID generated by KCX

  ConnectionName:
    Type: String
    Description: Friendly connection name from KCX

  CallbackUrl:
    Type: String
    Description: KCX callback endpoint URL

  CallbackToken:
    Type: String
    Description: Unique callback token generated by KCX

Resources:

  KCXReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub kcx-${ConnectionName}-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: "arn:aws:iam::275017715736:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  KCXCallbackLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  KCXCallbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt KCXCallbackLambdaRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          const https = require('https');
          const { URL } = require('url');

          exports.handler = async (event) => {
            console.log('EVENT:', JSON.stringify(event));

            const requestType = event.RequestType;
            const props = event.ResourceProperties || {};

            if (requestType === 'Delete') {
              console.log('Delete event received, skipping callback.');
              return {
                PhysicalResourceId: event.PhysicalResourceId || 'kcx-callback-delete'
              };
            }

            const callbackUrl = props.CallbackUrl;
            const callbackToken = props.CallbackToken;
            const accountId = props.AccountId;
            const roleArn = props.RoleArn;
            const stackId = props.StackId;

            if (!callbackUrl || !callbackToken || !accountId || !roleArn || !stackId) {
              throw new Error('Missing required callback properties');
            }

            const parsed = new URL(callbackUrl);

            const body = JSON.stringify({
              callback_token: callbackToken,
              account_id: accountId,
              role_arn: roleArn,
              stack_id: stackId
            });

            const options = {
              hostname: parsed.hostname,
              port: parsed.port || 443,
              path: parsed.pathname + (parsed.search || ''),
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            };

            await new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log('Callback response status:', res.statusCode);
                  console.log('Callback response body:', data);
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve();
                  } else {
                    reject(new Error(`Callback failed: ${res.statusCode} ${data}`));
                  }
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });

            return {
              PhysicalResourceId: `kcx-callback-${accountId}`
            };
          };

  KCXNotifyPlatform:
    Type: Custom::KCXNotify
    Properties:
      ServiceToken: !GetAtt KCXCallbackFunction.Arn
      CallbackUrl: !Ref CallbackUrl
      CallbackToken: !Ref CallbackToken
      AccountId: !Ref AWS::AccountId
      RoleArn: !GetAtt KCXReadOnlyRole.Arn
      StackId: !Ref AWS::StackId

Outputs:
  RoleArn:
    Description: ARN of the role KCX can assume
    Value: !GetAtt KCXReadOnlyRole.Arn

  AccountId:
    Description: AWS account ID where stack was created
    Value: !Ref AWS::AccountId

  StackId:
    Description: CloudFormation stack ID
    Value: !Ref AWS::StackId

  CallbackFunctionArn:
    Description: ARN of callback Lambda
    Value: !GetAtt KCXCallbackFunction.Arn